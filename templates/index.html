<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Intrusion Detection System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .hero{
            margin-top:100px;
        }

        .card{
            border:none;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h1{
            font-weight:700;
        }

        .btn-custom{
            padding:12px 30px;
            font-size:18px;
        }
    </style>

</head>
<body>

<div class="container hero">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card p-5 text-center">

                <h1 class="mb-3">
                    AI-Based Intrusion Detection System
                </h1>

                <p class="lead">
                    Detect and classify network attacks using Machine Learning.
                </p>

                <hr>

                <p>
                    Upload network traffic data, analyze malicious activities,
                    and visualize prediction results through an interactive dashboard.
                </p>

                <br>

                <a href="/dashboard" class="btn btn-primary btn-custom">
                    Go to Dashboard
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
